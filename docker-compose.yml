services:
  postgres:
    image: postgres:16-alpine
    container_name: dsep-pg
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dsep_test}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - .data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: dsep-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-dsep_test}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_ALG: ${JWT_ALG:-HS256}
      JWT_TTL_MIN: ${JWT_TTL_MIN:-480}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./allure-results:/app/allure-results
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: dsep-frontend
    working_dir: /app
    environment:
      VITE_FRONTEND_ENABLED: ${VITE_FRONTEND_ENABLED:-true}
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
      VITE_WS_BASE: ${VITE_WS_BASE:-ws://localhost:8000}
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    profiles: ["dev"]
